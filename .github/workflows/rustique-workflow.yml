
name: Rustique Workflow

on:
  push:
#    branches: [ omega ] - disable this for production. Only build when there is a release
# should be turned on for specific testing branches
    tags: ['v*']
  pull_request:
    branches: [ omega ]
  workflow_dispatch:  # Allows manual triggering

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary_name: Rustique
            asset_name: rustique-linux-x86_64
            rustflags: ""
            
#          - os: ubuntu-latest
#            target: aarch64-unknown-linux-musl
#            binary_name: Rustique
#            asset_name: rustique-linux-arm64
#            rustflags: "-C linker=aarch64-linux-gnu-gcc"

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: Rustique.exe
            asset_name: rustique-windows-x86_64
            rustflags: "-C link-args=/SUBSYSTEM:CONSOLE"

          - os: macos-latest
            target: x86_64-apple-darwin
            binary_name: Rustique
            asset_name: rustique-macos-x86_64
            rustflags: ""
            
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: Rustique
            asset_name: rustique-macos-arm64
            rustflags: ""

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@nightly
      with:
        targets: ${{ matrix.target }}

    - name: Install musl tools (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y musl-tools musl-dev
        
#    - name: Install cross-compilation tools (ARM64)
#      if: matrix.target == 'aarch64-unknown-linux-musl'
#      run: |
#        sudo apt-get update
#        sudo apt-get install -y gcc-aarch64-linux-gnu musl-tools
#        rustup target add aarch64-unknown-linux-musl

    - name: Build with Cargo
      env:
        RUSTFLAGS: ${{ matrix.rustflags }}
      run: cargo build --release --target ${{ matrix.target }}
    
    # Upload the ZIP artifacts only
    - name: Upload ZIP artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.asset_name }}
        path: target/${{ matrix.target }}/release/${{ matrix.binary_name }}
        if-no-files-found: error

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create platform-specific archives
        run: |
          mkdir -p archives
          cd release-artifacts
          for dir in */; do
            platform=$(basename "$dir")
            cd "$dir"
            if [[ "$platform" == *"windows"* ]]; then
              zip -9 "../../archives/${platform}.zip" *.exe
            else
              zip -9 "../../archives/${platform}.zip" *
            fi
            cd ..
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: archives/*
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
