
name: Rustique Workflow

on:
  push:
    branches: [ 0.4 ]
  pull_request:
    branches: [ 0.4 ]
  workflow_dispatch:  # Allows manual triggering

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary_name: Rustique
            asset_name: rustique-linux-x86_64
            rustflags: ""

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: Rustique.exe
            asset_name: rustique-windows-x86_64
            rustflags: "-C link-args=/SUBSYSTEM:CONSOLE"

          - os: macos-latest
            target: x86_64-apple-darwin
            binary_name: Rustique
            asset_name: rustique-macos-x86_64
            rustflags: ""

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Install musl tools (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y musl-tools musl-dev

    - name: Build with Cargo
      env:
        RUSTFLAGS: ${{ matrix.rustflags }}
      run: cargo build --release --target ${{ matrix.target }}
    
    - name: Create ZIP (Linux/macOS)
      if: matrix.os != 'windows-latest'
      run: |
        cd target/${{ matrix.target }}/release
        mkdir -p $GITHUB_WORKSPACE/dist
        cp ${{ matrix.binary_name }} $GITHUB_WORKSPACE/dist/
        cd $GITHUB_WORKSPACE
        zip -j ${{ matrix.asset_name }}.zip dist/${{ matrix.binary_name }}
      
    # Create ZIP for Windows
    - name: Create ZIP (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        cd target/${{ matrix.target }}/release
        Compress-Archive -Path ${{ matrix.binary_name }} -DestinationPath $env:GITHUB_WORKSPACE\${{ matrix.asset_name }}.zip
      shell: pwsh

    # Upload the ZIP artifacts only
    - name: Upload ZIP artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.asset_name }}
        path: ${{ matrix.asset_name }}.zip
        if-no-files-found: error

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
