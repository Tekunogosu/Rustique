[package]
name = "Rustique"
version = "0.2.0"
edition = "2024"
authors = ["tekunogosu", "Violet4"]

[features]
debug = []
dev = []

[dependencies]
clap = { version = "4.5.37", features = ["cargo", "color", "suggestions", "derive" ] }
colored = "3.0.0"
rayon = "1.10.0"
ureq = { version = "3.0.11", features = ["json"] }
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.140"
zip = "2.6.1"
dirs = { version = "6.0.0" }
serde_json5 = {  version = "0.2.1" }
chrono = { version =  "0.4.40",features = ["serde"] }
comfy-table = "7.1.4"
url = "2.5.4"
lenient_semver = "0.4.2"
regex = "1.11.1"
semver = "1.0.26"
toml = "0.8.22"
tracing = "0.1.41"
tracing-subscriber = { version = "0.3.19", features = ["env-filter"] }
tracing-appender = "0.2.3"
reqwest = { version = "0.12.15", features = ["json"] }
tokio = { version = "1.44.2", features = ["fs", "full"] }

[profile.dev]
opt-level = 1

[profile.dev.package."*"]
opt-level = 3

[profile.release]
opt-level = 3
lto = "fat"
debug = false
codegen-units = 1
