[package]
name = "Rustique"
version = "0.1.0"
edition = "2024"
authors = ["tekunogosu", "Violet4"]

[features]
debug_mode = []

[dependencies]
clap = { version = "4.5.37", features = ["cargo", "color", "suggestions", "derive" ] }
colored = "3.0.0"
rayon = "1.10.0"
ureq = { version = "3.0.11", features = ["json"] }
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.140"
zip = "2.6.1"
dirs = { version = "6.0.0" }
serde_json5 = {  version = "0.2.1" }

[profile.dev]
opt-level = 1

[profile.dev.package."*"]
opt-level = 3

[profile.release]
opt-level = 3
lto = "fat"
debug = false
codegen-units = 1

[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=/usr/bin/mold"]